name: 'Dependency Check'

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
      - refs/tags/*

jobs:
  depCheck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: 11
      - uses: eskatos/gradle-command-action@v3
        with:
          arguments: dependencyCheckAnalyze
